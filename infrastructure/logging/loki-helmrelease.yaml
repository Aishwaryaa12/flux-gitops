apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease

metadata:
  name: loki
  namespace: flux-system

spec:
  interval: 30m

  chart:
    spec:
      chart: loki
      version: "6.*"

      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  targetNamespace: logging

  install:
    createNamespace: false

  values:
    deploymentMode: SingleBinary

    singleBinary:
      replicas: 1

    loki:
      auth_enabled: false

    chunksCache:
      enabled: false

    resultsCache:
      enabled: false

    gateway:
      enabled: false

    backend:
      replicas: 0

    read:
      replicas: 0

    write:
      replicas: 0

    minio:
      enabled: false

    persistence:
      enabled: true
      storageClassName: local-path
      size: 10Gi
