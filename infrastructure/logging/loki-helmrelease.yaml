apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system

spec:
  interval: 30m

  targetNamespace: logging

  chart:
    spec:
      chart: loki
      version: "6.*"
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  install:
    createNamespace: false

  values:
    deploymentMode: SingleBinary

    gateway:
      enabled: false

    minio:
      enabled: false

    chunksCache:
      enabled: false

    resultsCache:
      enabled: false

    backend:
      replicas: 0

    read:
      replicas: 0

    write:
      replicas: 0

    singleBinary:
      replicas: 1

      persistence:
        enabled: true
        size: 10Gi
        storageClass: local-path

    loki:
      auth_enabled: false

      commonConfig:
        replication_factor: 1

      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      storage:
        type: filesystem

      limits_config:
        retention_period: 168h

      compactor:
        working_directory: /var/loki/retention
        retention_enabled: true
        delete_request_store: filesystem
