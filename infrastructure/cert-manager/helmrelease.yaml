apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system

spec:
  interval: 30m

  chart:
    spec:
      chart: cert-manager
      version: "v1.18.*"

      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system

  targetNamespace: cert-manager

  install:
    createNamespace: true

  values:
    crds:
      enabled: true
