apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease

metadata:
  name: kube-prometheus-stack
  namespace: flux-system

spec:
  interval: 30m

  chart:
    spec:
      chart: kube-prometheus-stack
      version: "77.*"

      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system

  targetNamespace: monitoring

  install:
    createNamespace: false
