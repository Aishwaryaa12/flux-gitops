apiVersion: v1
kind: Namespace
metadata:
  name: vaultwarden

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  replicas: 1

  selector:
    matchLabels:
      app: vaultwarden

  template:
    metadata:
      labels:
        app: vaultwarden

    spec:
      containers:
        - name: vaultwarden
          image: vaultwarden/server:1.36.0 # {"$imagepolicy": "flux-system:vaultwarden"}

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

          ports:
            - containerPort: 80
              name: http

          env:
            - name: SIGNUPS_ALLOWED
              value: "false"

            - name: DOMAIN
              value: "https://vault.cralyx.com"

          volumeMounts:
            - name: data
              mountPath: /data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data

---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: vaultwarden

spec:
  selector:
    app: vaultwarden

  ports:
    - port: 80
      targetPort: 80
